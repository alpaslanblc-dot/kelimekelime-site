<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    <style>
        :root { 
            --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; 
            --border: #e2e8f0; --white: #ffffff; --ad-bg: #f1f5f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* REKLAM ALANLARI (AD SLOTS) */
        .ad-placeholder {
            background: var(--ad-bg);
            border: 2px dashed var(--border);
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.8rem;
            border-radius: 12px;
            min-height: 100px; /* CLS Engelleme: Alanı önceden ayır */
        }
        .ad-banner { width: 100%; min-height: 250px; } /* Sidebar veya orta reklam */

        /* SKELETON SCREEN (Yükleme Efekti) */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* MODAL & LEGAL PAGES */
        .footer-links { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); margin-top: 40px; }
        .footer-links a { color: var(--muted); text-decoration: none; margin: 0 10px; font-size: 0.85rem; cursor: pointer; }
        .footer-links a:hover { color: var(--primary); }

        /* KART TASARIMI (PRO) */
        .word-card { background: var(--white); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; transition: 0.3s; }
        .word-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="ad-placeholder" style="max-width: 800px; margin: 10px auto;">Google AdSense (Header Banner)</div>

<main class="container" id="mainContainer">
    <div id="results">
        <div class="word-card"><div class="skeleton" style="height:20px; width:30%;"></div><div class="skeleton" style="height:60px;"></div></div>
        <div class="word-card"><div class="skeleton" style="height:20px; width:30%;"></div><div class="skeleton" style="height:60px;"></div></div>
    </div>
</main>

<div class="ad-placeholder ad-banner" style="max-width: 800px; margin: 20px auto;">Google AdSense (Sticky Footer / In-Feed)</div>

<footer class="footer-links">
    <a onclick="showLegal('about')">Hakkımızda</a>
    <a onclick="showLegal('privacy')">Gizlilik Politikası</a>
    <a onclick="showLegal('terms')">Kullanım Şartları</a>
    <p style="margin-top:20px; font-size:0.75rem; color:var(--muted);">© 2024 KelimeKelime.com - Para Kazanma Makinesi Aktif.</p>
</footer>

<script>
    // HUKUKİ İÇERİKLER (AdSense için zorunlu)
    const legalContent = {
        about: { title: "Hakkımızda", text: "KelimeKelime, Türkiye'nin en kapsamlı bulmaca sözlüğüdür..." },
        privacy: { title: "Gizlilik Politikası", text: "Verileriniz Google reklam standartlarına uygun olarak korunmaktadır. Çerezler kullanıcı deneyimini artırmak için kullanılır..." },
        terms: { title: "Kullanım Şartları", text: "Sitemizi kullanarak tüm kullanım koşullarını kabul etmiş sayılırsınız..." }
    };

    function showLegal(type) {
        const page = legalContent[type];
        // Profesyonel modal yapısını burada tetikleyebiliriz
        alert(`${page.title}\n\n${page.text}`);
    }

    // AD-SENSENT FEED LOGIC (Veri basarken reklam aralara sızar)
    function render(data, title = "") {
        const res = document.getElementById('results');
        res.innerHTML = title ? `<h2 style="margin-bottom:20px; font-weight:800;">${title}</h2>` : '';

        data.forEach((item, index) => {
            // HER 3 KARTTA BİR REKLAM EKLE (Para Kazanma Dinamiği)
            if (index > 0 && index % 3 === 0) {
                const ad = document.createElement('div');
                ad.className = 'ad-placeholder';
                ad.innerText = "Google AdSense (In-Feed Native Ad)";
                res.appendChild(ad);
            }

            const art = document.createElement('article');
            art.className = 'word-card';
            art.innerHTML = `
                <div style="font-size:0.7rem; font-weight:800; color:var(--muted); margin-bottom:10px;">BULMACA CEVABI</div>
                <h2 style="font-size:1.8rem; color:var(--primary); margin-bottom:10px;">${item.kelime.toUpperCase()}</h2>
                <p style="color:var(--text); line-height:1.6;">${item.anlam}</p>
            `;
            res.appendChild(art);
        });
    }
</script>
</body>
</html>
