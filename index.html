    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5; --primary-light: #eef2ff; --bg: #fdfdfd; 
            --card: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #f1f5f9;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 0; 
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px); background-size: 20px 20px;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); 
            padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-icon { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; width: 34px; height: 34px; transform: rotate(-5deg); }
        .grid-box { border-radius: 4px; }
        .grid-box.empty { background: var(--primary-light); }
        .grid-box.filled { background: var(--primary); }
        .logo-main { font-size: 1.4rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .logo-main span { color: var(--primary); }

        .menu-trigger {
            background: var(--primary-light); color: var(--primary); border: none; padding: 10px 15px;
            border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.9rem;
        }

        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 2001; padding: 2rem; display: flex; flex-direction: column; gap: 1rem;
            overflow-y: auto;
        }
        .side-menu.active { right: 0; }
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px); z-index: 2000; display: none;
        }
        .menu-overlay.active { display: block; }
        .menu-item {
            text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 1rem;
            padding: 10px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .menu-item:hover { background: var(--primary-light); color: var(--primary); }
        .menu-close { align-self: flex-end; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }

        .container { max-width: 850px; margin: 0 auto; padding: 1rem; }
        .hero { text-align: center; margin: 2rem 0; }
        .search-wrapper { 
            display: flex; gap: 8px; background: var(--card); padding: 8px; border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }
        .search-wrapper input { flex: 1; border: none; padding: 12px; font-size: 1rem; outline: none; background: transparent; }
        .search-wrapper button { background: var(--primary); color: white; border: none; padding: 0 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 700; }
        
        .cat-strip, .alphabet-strip { 
            display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 20px 0; 
            min-height: 40px;
        }
        .cat-btn, .letter-btn { background: var(--card); border: 1px solid var(--border); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cat-btn { padding: 0.6rem 1.2rem; border-radius: 12px; font-size: 0.8rem; color: var(--text-muted); }
        .letter-btn { width: 36px; height: 36px; border-radius: 10px; font-size: 0.85rem; color: var(--text-main); }
        .cat-btn:hover, .letter-btn:hover { background: var(--primary); color: white !important; }

        .word-card { background: var(--card); padding: 1.8rem; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 1.5rem; }
        
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 10% auto; padding: 2rem; width: 90%; max-width: 500px; border-radius: 24px; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="side-menu" id="sideMenu" role="navigation">
        <button class="menu-close" onclick="toggleMenu()" aria-label="Kapat">✕</button>
        <div style="font-weight: 800; color: var(--primary); margin-bottom: 5px; font-size: 0.75rem; text-transform: uppercase;">Navigasyon</div>
        <a class="menu-item" onclick="toggleMenu(); location.reload();">🏠 Ana Sayfa</a>
        <a class="menu-item" onclick="showInfo('about')">📖 Hakkımızda</a>
        <a class="menu-item" onclick="showInfo('privacy')">🔒 Gizlilik</a>
        <a class="menu-item" onclick="toggleMenu(); document.getElementById('iletisimArea').scrollIntoView({behavior: 'smooth'});">📧 İletişim</a>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div style="font-weight: 800; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;">Kategoriler</div>
        <div id="sideCategoryList"></div>
    </nav>

    <header class="navbar">
        <div class="logo-wrapper" onclick="location.reload()">
            <div class="logo-icon">
                <div class="grid-box empty"></div><div class="grid-box filled"></div>
                <div class="grid-box filled"></div><div class="grid-box empty"></div>
            </div>
            <div class="logo-text"><div class="logo-main">Kelime<span>Kelime</span></div></div>
        </div>
        <button class="menu-trigger" onclick="toggleMenu()" aria-label="Menüyü Aç">MENÜ ☰</button>
    </header>

    <main class="container">
        <section class="hero">
            <h1 style="font-size: 2.5rem; letter-spacing: -2px; font-weight: 800;">Bulmaca Sözlüğü</h1>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Aradığınız bulmaca cevapları ve kelime anlamları için doğru yerdesiniz.</p>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Kelime veya anlam ara..." aria-label="Arama kutusu">
                <button id="searchBtn">Ara</button>
            </div>
        </section>

        <nav id="categoryStrip" class="cat-strip" aria-label="Kategoriler"></nav>
        <nav id="alphabetStrip" class="alphabet-strip" aria-label="Alfabetik Arama"></nav>
        
        <section id="results" aria-live="polite"></section>

        <section id="iletisimArea" style="background: white; padding: 40px; border-radius: 24px; text-align: center; margin-top: 50px; border: 1px solid var(--border);">
            <h3 style="font-weight: 800;">Bize Ulaşın</h3>
            <p style="color: var(--text-muted); margin-bottom: 1rem;">Eksik bir kelime mi buldunuz?</p>
            <button onclick="showContactForm()" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer;">Kelime Öner</button>
        </section>
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 KelimeKelime. Tüm Hakları Saklıdır.
    </footer>

    <div id="infoModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalTitle" style="font-weight: 800;"></h3>
            <div id="modalText" style="margin: 20px 0; line-height: 1.6;"></div>
            <button onclick="document.getElementById('infoModal').style.display='none'" style="width:100%; padding:12px; border:none; background:var(--primary); color:white; font-weight:bold; border-radius:12px; cursor: pointer;">Kapat</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://mvsbrknkfwwptjifdqca.supabase.co';
        const SB_KEY = 'sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initAlphabet();
            loadCategories();
            initSearch();
            showVitrin();
        });

        function initAlphabet() {
            const alphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");
            const strip = document.getElementById('alphabetStrip');
            if(!strip) return;
            strip.innerHTML = '';
            alphabet.forEach(l => {
                const b = document.createElement('button');
                b.className = 'letter-btn';
                b.innerText = l;
                b.setAttribute('aria-label', `${l} harfi ile başlayan kelimeler`);
                b.onclick = () => getByLetter(l);
                strip.appendChild(b);
            });
        }

        function loadCategories() {
            const strip = document.getElementById('categoryStrip');
            const sideList = document.getElementById('sideCategoryList');
            const cats = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor", "Denizcilik"];
            const emojis = {"Tarih":"📜","Sanat":"🎨","İnanç":"🕌","Doğa":"🌿","Tıp":"⚕️","Siyaset":"⚖️","Spor":"⚽","Denizcilik":"⚓"};

            if(strip) {
                strip.innerHTML = '<button class="cat-btn" onclick="fetchRandomWord()" style="background:var(--primary-light); color:var(--primary)">🎲 Rastgele</button>';
                cats.forEach(c => {
                    const b = document.createElement('button');
                    b.className = 'cat-btn';
                    b.innerText = c;
                    b.onclick = () => filterByCategory(c);
                    strip.appendChild(b);
                });
            }

            if(sideList) {
                sideList.innerHTML = '';
                cats.forEach(c => {
                    const a = document.createElement('a');
                    a.className = 'menu-item';
                    a.innerHTML = `<span>${emojis[c] || '🏷️'}</span> ${c}`;
                    a.onclick = () => { toggleMenu(); filterByCategory(c); document.getElementById('results').scrollIntoView({behavior:'smooth'}); };
                    sideList.appendChild(a);
                });
            }
        }

        function initSearch() {
            const inp = document.getElementById('searchInput');
            if(inp) {
                inp.oninput = (e) => {
                    const val = e.target.value.trim();
                    if(val.length >= 2) runSearch(val);
                    else if(val.length === 0) showVitrin();
                };
            }
        }

        async function showVitrin() {
            const { data: allData } = await _supabase.from('kelimeler').select('id');
            if (allData?.length > 0) {
                const seed = new Date().getDate();
                const shuffled = [...allData].sort(() => (Math.sin(seed) * 10000 % 1) - 0.5);
                const { data } = await _supabase.from('kelimeler').select('*').in('id', shuffled.slice(0, 5).map(i => i.id));
                render(data, "📅 Bugünün Öne Çıkan Kelimeleri");
            }
        }

        async function runSearch(q) {
            const { data } = await _supabase.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(25);
            render(data);
        }

        async function getByLetter(l) {
            const { data } = await _supabase.from('kelimeler').select('*').ilike('kelime', `${l}%`).order('kelime');
            render(data, `${l} Harfi İle Başlayanlar`);
        }

        async function filterByCategory(cat) {
            const { data } = await _supabase.from('kelimeler').select('*').eq('kategori', cat).order('kelime');
            render(data, `${cat} Kategorisi`);
        }

        async function fetchRandomWord() {
            const { data } = await _supabase.from('kelimeler').select('*').limit(100);
            if(data) render([data[Math.floor(Math.random() * data.length)]], "🎲 Rastgele Seçilen Kelime");
        }

        function render(data, title = "") {
            const res = document.getElementById('results');
            if(!res) return;
            res.innerHTML = title ? `<h2 style="text-align:center; font-weight:800; font-size:1.3rem; margin-bottom:1.5rem; color:var(--text-main);">${title}</h2>` : '';
            
            if(!data || data.length === 0) {
                res.innerHTML += '<div style="text-align:center; padding:3rem; opacity:0.5">Aradığınız kriterlere uygun sonuç bulunamadı.</div>';
                return;
            }

            data.forEach(item => {
                const art = document.createElement('article');
                art.className = 'word-card';
                art.setAttribute('itemscope', '');
                art.setAttribute('itemtype', 'https://schema.org/DefinedTerm');
                
                art.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Tanım</span>
                        <span itemprop="category" style="background:var(--primary-light); color:var(--primary); padding:4px 8px; border-radius:6px; font-size:0.7rem; font-weight:800;">${item.kategori || 'Genel'}</span>
                    </div>
                    <p itemprop="description" style="font-size:1.1rem; color:var(--text-main); margin-bottom:15px; font-weight:500; line-height:1.5;">${item.anlam}</p>
                    <div style="border-top:1px solid var(--border); padding-top:10px;">
                        <span style="font-size:0.7rem; font-weight:800; color:var(--primary); text-transform:uppercase;">Cevap</span>
                        <h2 itemprop="name" style="margin:0; font-size:1.7rem; color:var(--text-main); font-weight:800; letter-spacing:1px;">${item.kelime}</h2>
                    </div>
                `;
                res.appendChild(art);
            });
        }

        function showInfo(type) {
            toggleMenu();
            const m = document.getElementById('infoModal');
            document.getElementById('modalTitle').innerText = type === 'about' ? "Hakkımızda" : "Gizlilik Politikası";
            document.getElementById('modalText').innerText = type === 'about' ? 
                "KelimeKelime, kare ve çengel bulmaca tutkunları için geliştirilmiş modern bir dijital sözlüktür. Amacımız, en zorlu bulmacalarda bile doğru bilgiye en hızlı şekilde ulaşmanızı sağlamaktır." : 
                "Kullanıcı gizliliği bizim önceliğimizdir. Sitemizde kişisel verileriniz toplanmaz, yalnızca deneyimi iyileştirmek adına anonim kullanım istatistikleri takip edilir.";
            m.style.display = 'block';
        }

        function showContactForm() { alert("Öneri sistemimiz çok yakında aktif olacak. Teşekkürler!"); }
    </script>
</body>
