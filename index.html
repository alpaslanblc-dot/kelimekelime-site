<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    <style>
        :root { --primary: #4f46e5; --bg: #fdfdfd; --border: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .navbar { display: flex; justify-content: space-between; padding: 1rem 5%; background: white; border-bottom: 1px solid var(--border); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .word-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .error-box { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #f87171; }
        .search-wrapper { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="navbar">
        <strong style="color:var(--primary); font-size: 1.2rem;">KelimeKelime</strong>
        <span>Bulmaca Asistanı</span>
    </header>

    <main class="container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Kelime veya anlam ara...">
            <button id="searchBtn">Ara</button>
        </div>
        <div id="status-msg"></div>
        <div id="results">Veriler yükleniyor...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Bağlantı Bilgileri
        const SB_URL = 'https://mvsbrknkfwwptjifdqca.supabase.co';
        const SB_KEY = 'sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr';
        
        let _supabase;
        try {
            _supabase = supabase.createClient(SB_URL, SB_KEY);
        } catch (e) {
            document.getElementById('results').innerHTML = `<div class="error-box">Supabase Başlatılamadı: ${e.message}</div>`;
        }

        window.onload = () => {
            showVitrin();
            document.getElementById('searchBtn').onclick = () => runSearch();
        };

        async function showVitrin() {
            const resDiv = document.getElementById('results');
            try {
                const { data, error } = await _supabase.from('kelimeler').select('*').limit(10);
                
                if (error) {
                    resDiv.innerHTML = `<div class="error-box">Veri Çekme Hatası: ${error.message}<br><small>Tablo ismini (kelimeler) kontrol edin.</small></div>`;
                    return;
                }
                render(data);
            } catch (e) {
                resDiv.innerHTML = `<div class="error-box">Sistem Hatası: ${e.message}</div>`;
            }
        }

        async function runSearch() {
            const q = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Aranıyor...";
            
            try {
                const { data, error } = await _supabase.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(20);
                if (error) throw error;
                render(data);
            } catch (e) {
                resDiv.innerHTML = `<div class="error-box">Arama Hatası: ${e.message}</div>`;
            }
        }

        function render(data) {
            const resDiv = document.getElementById('results');
            if (!data || data.length === 0) {
                resDiv.innerHTML = "Sonuç bulunamadı.";
                return;
            }

            resDiv.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'word-card';
                // Sütun isimlerini güvenli bir şekilde kontrol ediyoruz
                const kelime = item.kelime || "Bilinmiyor";
                const anlam = item.anlam || "Tanım bulunamadı";
                const kategori = item.kategori || "Genel";
                
                div.innerHTML = `
                    <small style="color:var(--primary); font-weight:bold;">${kategori}</small>
                    <p style="margin: 10px 0;">${anlam}</p>
                    <h2 style="margin:0; font-size:1.4rem;">${kelime}</h2>
                `;
                resDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
