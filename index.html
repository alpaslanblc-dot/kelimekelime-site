<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü ve Terimler Rehberi</title>
    <meta name="description" content="Tıp, Mitoloji, Tarih ve Denizcilik alanında binlerce kelimenin anlamı ve bulmaca cevapları.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --bg: #fdfdfd; 
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px); 
            background-size: 20px 20px;
            color: var(--text-main); 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            padding: 1rem 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1.5px; cursor: pointer; }
        .logo span { color: var(--primary); }

        .admin-link { 
            text-decoration: none; background: var(--primary-light); color: var(--primary); 
            padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
            transition: 0.3s;
        }
        .admin-link:hover { background: var(--primary); color: white; }

        .container { max-width: 850px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: -3px; font-weight: 800; }
        
        .search-wrapper { 
            display: flex; gap: 10px; background: var(--card); padding: 12px; 
            border-radius: 20px; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.08); 
            border: 1px solid var(--border); margin-top: 1.5rem; transition: 0.4s ease;
        }
        .search-wrapper:focus-within { border-color: var(--primary); transform: translateY(-2px); }
        .search-wrapper input { flex: 1; border: none; padding: 12px; font-size: 1.2rem; outline: none; background: transparent; }
        .search-wrapper button { background: var(--primary); color: white; border: none; padding: 0 2rem; border-radius: 14px; cursor: pointer; font-weight: 700; }

        .cat-strip { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.6rem; margin: 2rem 0 1rem 0; }
        .cat-btn { 
            background: var(--card); color: var(--text-muted); padding: 0.6rem 1.2rem; 
            border-radius: 12px; border: 1px solid var(--border); font-weight: 700; cursor: pointer;
            font-size: 0.8rem; transition: 0.2s;
        }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }

        .alphabet-strip { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 3rem; min-height: 50px; }
        .letter-btn { 
            width: 38px; height: 38px; border: 1px solid var(--border); background: var(--card); 
            color: var(--text-muted); border-radius: 10px; cursor: pointer; font-weight: 700; 
            transition: all 0.2s;
        }
        .letter-btn:hover { background: var(--primary); color: white; transform: translateY(-4px); }

        .word-card { 
            background: var(--card); padding: 2.5rem; border-radius: 28px; border: 1px solid var(--border); 
            margin-bottom: 1.8rem; transition: 0.4s; position: relative;
        }
        .word-card:hover { transform: translateY(-6px); box-shadow: 0 25px 40px -10px rgba(0,0,0,0.06); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; }
        .label { color: var(--text-muted); font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.5px; }
        
        .cat-badge { 
            padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; 
            text-transform: uppercase; border: 1px solid rgba(0,0,0,0.04);
        }

        .word-card p { margin: 0.5rem 0 2rem 0; line-height: 1.7; color: var(--text-main); font-size: 1.2rem; }
        
        .answer-section { border-top: 1.5px solid var(--border); padding-top: 1.5rem; }
        .answer-section h2 { margin: 0.6rem 0 0 0; color: var(--text-main); font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Paylaş & Kopyala Alanı */
        .card-footer { 
            display: flex; justify-content: flex-end; align-items: center; gap: 10px; 
            margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--border);
        }
        .action-btn {
            background: var(--primary-light); color: var(--primary); border: none;
            padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: var(--primary); color: white; }
        .copy-success { color: #10b981; font-size: 0.7rem; font-weight: 600; margin-right: auto; display: none; }

        .ad-slot {
            margin: 2rem 0; padding: 1rem; background: #f8fafc;
            border: 2px dashed #e2e8f0; border-radius: 20px;
            text-align: center; color: #94a3b8; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
