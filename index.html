<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Dijital Sözlük</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --bg: #fdfdfd; 
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px); 
            background-size: 20px 20px;
            color: var(--text-main); 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            padding: 1rem 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1.5px; }
        .logo span { color: var(--primary); }

        .admin-link { 
            text-decoration: none; background: var(--primary-light); color: var(--primary); 
            padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
            transition: 0.3s;
        }
        .admin-link:hover { background: var(--primary); color: white; }

        .container { max-width: 850px; margin: 0 auto; padding: 4rem 1.5rem; }
        
        .hero { text-align: center; margin-bottom: 4rem; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 0.5rem; letter-spacing: -3px; font-weight: 800; }
        
        .search-wrapper { 
            display: flex; gap: 10px; background: var(--card); padding: 12px; 
            border-radius: 20px; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.08); 
            border: 1px solid var(--border); margin-top: 2.5rem; transition: 0.4s ease;
        }
        .search-wrapper:focus-within { border-color: var(--primary); transform: translateY(-2px); }
        .search-wrapper input { flex: 1; border: none; padding: 12px; font-size: 1.2rem; outline: none; background: transparent; }
        .search-wrapper button { background: var(--primary); color: white; border: none; padding: 0 2rem; border-radius: 14px; cursor: pointer; font-weight: 700; }

        .alphabet-strip { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.7rem; margin: 3.5rem 0; min-height: 50px; }
        .letter-btn { 
            width: 42px; height: 42px; border: 1px solid var(--border); background: var(--card); 
            color: var(--text-muted); border-radius: 12px; cursor: pointer; font-weight: 700; 
            transition: all 0.2s;
        }
        .letter-btn:hover { background: var(--primary); color: white; transform: translateY(-4px); }

        .word-card { 
            background: var(--card); padding: 2.5rem; border-radius: 28px; border: 1px solid var(--border); 
            margin-bottom: 1.8rem; transition: 0.4s; position: relative;
        }
        .word-card:hover { transform: translateY(-6px); box-shadow: 0 25px 40px -10px rgba(0,0,0,0.06); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; }
        .label { color: var(--text-muted); font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.5px; }
        
        .cat-badge { 
            padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; 
            text-transform: uppercase; border: 1px solid rgba(0,0,0,0.04);
        }

        .word-card p { margin: 0.5rem 0 2rem 0; line-height: 1.7; color: var(--text-main); font-size: 1.2rem; }
        
        .answer-section { border-top: 1.5px solid var(--border); padding-top: 1.5rem; }
        .answer-section h2 { margin: 0.6rem 0 0 0; color: var(--text-main); font-size: 2rem; font-weight: 800; text-transform: uppercase; }

        footer { text-align: center; padding: 5rem; color: var(--text-muted); font-size: 0.9rem; opacity: 0.6; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">Kelime<span>Kelime</span></div>
        <a href="admin.html" class="admin-link">Yönetim Paneli</a>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Sözlükte Keşfe Çık</h1>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Bir kelime veya tanım yazın...">
                <button id="searchBtn">Ara</button>
            </div>
        </section>

        <div id="alphabetStrip" class="alphabet-strip"></div>
        <div id="results"></div>
    </main>

    <footer>&copy; 2024 KelimeKelime Digital</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script> </body>
</html>
