<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime - Arama</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-container { width: 100%; max-width: 600px; margin-top: 50px; }
        #searchInput { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #007bff; border-radius: 30px; outline: none; box-sizing: border-box; }
        #result { width: 100%; max-width: 600px; margin-top: 20px; }
        .word-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 6px solid #007bff; transition: transform 0.2s; }
        .word-card:hover { transform: translateY(-3px); }
        .word-card h3 { margin: 0 0 10px 0; color: #007bff; text-transform: uppercase; }
        .word-card p { margin: 0; color: #444; line-height: 1.6; font-size: 17px; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1 style="text-align: center; color: #333;">KelimeKelime</h1>
        <input type="text" id="searchInput" onkeyup="ara()" placeholder="Kelime aramaya başlayın..." autocomplete="off">
    </div>

    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
