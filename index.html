<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2174139710234620" crossorigin="anonymous"></script>

    <style>
        :root { --primary: #4f46e5; --bg: #fdfdfd; --text: #1e293b; --border: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin:0; }
        .navbar { display: flex; justify-content: space-between; padding: 1rem 5%; background: white; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
        .side-menu { position: fixed; top: 0; right: -300px; width: 250px; height: 100%; background: white; transition: 0.3s; z-index: 2001; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; }
        .overlay.active { display: block; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .search-wrapper { display: flex; gap: 10px; margin: 20px 0; }
        .search-wrapper input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; }
        .word-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .ad-slot { background: #f8fafc; margin: 15px 0; border: 1px dashed #ccc; min-height: 90px; text-align: center; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    
    <nav id="sideMenu" class="side-menu">
        <button onclick="toggleMenu()" style="cursor:pointer">Kapat ✕</button>
        <div style="margin-top:20px;">
            <p onclick="location.reload()" style="cursor:pointer">🏠 Ana Sayfa</p>
            <hr>
            <div id="sideCategoryList"></div>
        </div>
    </nav>

    <header class="navbar">
        <strong onclick="location.reload()" style="cursor:pointer; color:var(--primary); font-size: 1.2rem;">KelimeKelime</strong>
        <button onclick="toggleMenu()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">MENÜ</button>
    </header>

    <main class="container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Kelime veya anlam ara...">
            <button id="searchBtn" style="cursor:pointer">Ara</button>
        </div>

        <div id="results"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // GLOBAL TANIMLAMALAR (Hata almamak için pencereye bağlıyoruz)
        window.toggleMenu = function() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        const SB_URL = 'https://mvsbrknkfwwptjifdqca.supabase.co';
        const SB_KEY = 'sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        window.onload = () => {
            loadCategories();
            showVitrin();
            
            document.getElementById('searchBtn').onclick = () => {
                const q = document.getElementById('searchInput').value;
                runSearch(q);
            };
        };

        async function loadCategories() {
            const cats = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor", "Denizcilik"];
            const sideList = document.getElementById('sideCategoryList');
            cats.forEach(c => {
                const p = document.createElement('p');
                p.innerText = "• " + c;
                p.style.cursor = "pointer";
                p.onclick = () => { toggleMenu(); filterByCategory(c); };
                sideList.appendChild(p);
            });
        }

        async function showVitrin() {
            const { data } = await _supabase.from('kelimeler').select('*').limit(5);
            render(data, "📅 Bugünün Öne Çıkanları");
        }

        async function runSearch(q) {
            const { data } = await _supabase.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(20);
            render(data);
        }

        async function filterByCategory(c) {
            const { data } = await _supabase.from('kelimeler').select('*').eq('kategori', c);
            render(data, c);
        }

        function render(data, title = "") {
            const res = document.getElementById('results');
            res.innerHTML = title ? `<h3>${title}</h3>` : '';
            
            if(!data || data.length === 0) {
                res.innerHTML += '<p>Sonuç bulunamadı.</p>';
                return;
            }

            data.forEach((item, index) => {
                const d = document.createElement('div');
                d.className = 'word-card';
                d.innerHTML = `
                    <small style="color:var(--primary)">${item.kategori}</small>
                    <p>${item.anlam}</p>
                    <h2 style="margin:0">${item.kelime}</h2>
                `;
                res.appendChild(d);

                // AdSense 400 hatası almamak için sadece ID varsa reklamı yükle
                if((index + 1) % 3 === 0) {
                    const ad = document.createElement('div');
                    ad.className = 'ad-slot';
                    ad.innerHTML = 'REKLAM ALANI'; // Gerçek ID girince buraya ins etiketi gelecek
                    res.appendChild(ad);
                }
            });
        }
    </script>
</body>
</html>
