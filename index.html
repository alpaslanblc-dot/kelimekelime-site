<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4f46e5; --bg: #f8fafc; --txt: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); }
        .nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.5rem; cursor: pointer; }
        .logo span { color: var(--p); }
        .m-btn { background: #eef2ff; color: var(--p); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .alpha-wrap { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 0; overflow-x: auto; }
        .alpha-grid { display: flex; justify-content: center; gap: 5px; width: max-content; margin: 0 auto; padding: 0 20px; }
        .l-btn { width: 32px; height: 32px; border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; cursor: pointer; font-weight: 800; flex-shrink: 0; }
        .l-btn:hover { background: var(--p); color: #fff; }
        .main { max-width: 800px; margin: 0 auto; padding: 20px; }
        .s-box { display: flex; gap: 10px; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .s-box input { flex: 1; border: none; outline: none; font-size: 1rem; }
        .s-box button { background: var(--p); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .card h2 { color: var(--p); font-size: 1.5rem; margin-top: 5px; }
        .card small { font-weight: 800; color: #64748b; background: #f1f5f9; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; }
        .menu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #fff; z-index: 200; transition: 0.3s; padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .menu.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        .overlay.active { display: block; }
        .m-item { padding: 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="ovl" class="overlay" onclick="toggleM()"></div>
<nav id="sid" class="menu">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <b>KATEGORİLER</b><button onclick="toggleM()" style="border:none; background:none; cursor:pointer; font-size:1.2rem;">✕</button>
    </div>
    <div id="cats"></div>
    <hr style="margin:20px 0; opacity:0.1;">
    <div class="m-item" onclick="alert('Hakkımızda sayfası')">Hakkımızda</div>
    <div class="m-item" onclick="alert('İletişim sayfası')">İletişim</div>
</nav>

<nav class="nav">
    <div class="logo" onclick="location.reload()">Kelime<span>Kelime</span></div>
    <button class="m-btn" onclick="toggleM()">MENÜ ☰</button>
</nav>

<div class="alpha-wrap">
    <div id="alpha" class="alpha-grid"></div>
</div>

<main class="main">
    <div class="s-box">
        <input type="text" id="sinp" placeholder="Kelime veya anlam ara...">
        <button onclick="search()">Ara</button>
    </div>
    <div id="res">Yükleniyor...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // URL ve KEY Tanımlamaları
    const URL = 'https://mvsbrknkfwwptjifdqca.supabase.co'; 
    const KEY = 'sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr';

    let sb;
    try {
        // CreateClient içindeki tırnaklara ve boşluklara dikkat!
        sb = supabase.createClient(URL, KEY);
    } catch (err) {
        console.error("Supabase başlatılamadı:", err.message);
        document.getElementById('res').innerHTML = "Bağlantı Ayarları Hatalı!";
    }

    function toggleM() {
        document.getElementById('sid').classList.toggle('active');
        document.getElementById('ovl').classList.toggle('active');
    }

    window.onload = () => {
        const letters = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");
        letters.forEach(l => {
            const b = document.createElement('button');
            b.className = 'l-btn'; b.innerText = l;
            b.onclick = () => getByL(l);
            document.getElementById('alpha').appendChild(b);
        });

        const cArr = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor"];
        cArr.forEach(c => {
            const d = document.createElement('div');
            d.className = 'm-item'; d.innerText = "📂 " + c;
            d.onclick = () => { toggleM(); getByC(c); };
            document.getElementById('cats').appendChild(d);
        });

        loadInit();
    };

    async function loadInit() {
        if(!sb) return;
        const { data, error } = await sb.from('kelimeler').select('*').limit(5);
        if(error) { document.getElementById('res').innerHTML = "Hata: " + error.message; return; }
        render(data, "Günün Kelimeleri");
    }

    async function search() {
        const q = document.getElementById('sinp').value;
        const { data } = await sb.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(20);
        render(data, "Arama Sonuçları");
    }

    async function getByL(l) {
        const { data } = await sb.from('kelimeler').select('*').ilike('kelime', `${l}%`).order('kelime');
        render(data, l + " Harfi");
    }

    async function getByC(c) {
        const { data } = await sb.from('kelimeler').select('*').eq('kategori', c);
        render(data, c);
    }

    function render(data, t) {
        const r = document.getElementById('res');
        r.innerHTML = `<h3>${t}</h3><br>`;
        if(!data || data.length === 0) { r.innerHTML += "Sonuç yok."; return; }
        data.forEach(i => {
            r.innerHTML += `<div class="card"><small>${i.kategori}</small><h2>${i.kelime.toUpperCase()}</h2><p>${i.anlam}</p></div>`;
        });
    }
</script>
</body>
</html>
