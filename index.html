    <main class="container">

    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">

    <script>
        // SUPABASE BAĞLANTISI (BİLGİLERİN GİRİLDİ)
        const SUPABASE_URL = "https://mvsbrknkfwwptjifdqca.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12c2Jya25rZnd3cHRqaWZkcWNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc1OTYsImV4cCI6MjA4Nzk0MzU5Nn0.k-DdP3f7slgFkNvIMrAF6L_3nLbQYkVvJtQFMRP8NqM";
        const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const viewArea = document.getElementById('viewArea');

        function toggleMenu() { 
            document.getElementById('sideMenu').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function closeModal() { 
            document.getElementById('customModal').style.display = 'none'; 
        }

        function openModal(html) { 
            document.getElementById('modalContent').innerHTML = html; 
            document.getElementById('customModal').style.display = 'flex'; 
            if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu(); 
        }

        // VERİ ÇEKME MOTORU
        async function loadData(params = {}) {
            viewArea.innerHTML = "<div style='text-align:center; padding:50px; color:#64748b;'>Kelimeler getiriliyor...</div>";
            let q = _db.from('kelimeler').select('*');
            
            if (params.harf) q = q.ilike('kelime', `${params.harf}%`);
            if (params.search) q = q.ilike('kelime', `%${params.search}%`);
            if (params.cat) q = q.eq('kategori', params.cat);

            const { data, error } = await q.order('kelime', { ascending: true }).limit(50);
            
            if (error) { 
                viewArea.innerHTML = "<div class='card'>Veri bağlantısında bir sorun oluştu.</div>"; 
                return; 
            }
            render(data, params.search || params.harf || params.cat || "Öne Çıkan Kelimeler");
        }

        function render(data, title) {
            viewArea.innerHTML = `<h1 style="margin-bottom:20px; color:#64748b; font-size:0.9rem; text-transform:uppercase; letter-spacing:1px;">${title}</h1>`;
            
            if (!data || data.length === 0) { 
                viewArea.innerHTML += "<div class='card' style='text-align:center; padding:40px;'>Aradığınız kriterde kelime bulunamadı. 🧩</div>"; 
                return; 
            }
            
            data.forEach((item, index) => {
                // ADSENSE REKLAM ALANI
                if (index > 0 && index % 5 === 0) {
                    viewArea.innerHTML += `
                        <div style="margin:20px 0; padding:20px; background:#f8fafc; border:2px dashed #e2e8f0; border-radius:15px; text-align:center;">
                            <span style="font-size:0.6rem; color:#94a3b8; font-weight:800;">REKLAM</span>
                            <div style="height:90px; display:flex; align-items:center; justify-content:center; color:#cbd5e1; font-size:0.8rem;">Google AdSense Onayı Bekleniyor</div>
                        </div>`;
                }

                const card = document.createElement('article');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="background:#eef2ff; color:#4f46e5; padding:4px 10px; border-radius:8px; font-size:0.7rem; font-weight:800;">${item.kategori || 'GENEL'}</span>
                    </div>
                    <p style="font-size:1.2rem; margin:15px 0; color:#1e293b; line-height:1.5;">${item.anlam}</p>
                    <div style="border-top:1px solid #f1f5f9; padding-top:15px;">
                        <h2 style="color:#4f46e5; font-size:1.7rem; font-weight:900; letter-spacing:1px;">${item.kelime.toUpperCase()}</h2>
                    </div>
                `;
                viewArea.appendChild(card);
            });
        }

        // BAŞLATICI
        window.onload = () => {
            // Alfabe
            const trAlpha = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");
            trAlpha.forEach(l => {
                const btn = document.createElement('button'); btn.className = 'btn-s'; btn.innerText = l;
                btn.onclick = () => loadData({ harf: l });
                document.getElementById('alphaStrip').appendChild(btn);
            });

            // Arama
            document.getElementById('searchBtn').onclick = () => {
                const val = document.getElementById('sInp').value;
                if(val) loadData({ search: val });
            };

            // Kategoriler
            const categories = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor"];
            categories.forEach(c => {
                const a = document.createElement('a'); a.className = 'menu-link'; a.innerText = c;
                a.onclick = () => { loadData({ cat: c }); toggleMenu(); };
                document.getElementById('menuCats').appendChild(a);
            });

            loadData(); // İlk verileri getir
        };

        // KURUMSAL MODALLAR
        function showPrivacy() { openModal("<h2>🛡️ Gizlilik Politikası</h2><p style='margin-top:15px; line-height:1.6;'>KelimeKelime.com, kullanıcı gizliliğine önem verir. Sitemizde kullanılan çerezler, reklam deneyiminizi iyileştirmek ve anonim trafik analizi yapmak içindir.</p>"); }
        function showContact() { openModal("<h2>📧 İletişim</h2><p style='margin-top:15px;'>Reklam ve iş birliği talepleri için:<br><strong>iletisim@kelimekelime.com</strong></p>"); }
        function showSuggest() {
            openModal(`
                <h2>🧩 Yeni Kelime Öner</h2>

                <input type="text" id="sugK" placeholder="Kelime" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #e2e8f0; border-radius:12
