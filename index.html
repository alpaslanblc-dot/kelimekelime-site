
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2174139710234620" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L0KTR31EQE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L0KTR31EQE');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #4f46e5; --primary-light: #eef2ff; --bg: #fdfdfd; --text: #1e293b; --border: #f1f5f9; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }

        /* LOGO & NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-icon { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; width: 34px; height: 34px; transform: rotate(-5deg); }
        .grid-box { border-radius: 4px; }
        .grid-box.empty { background: var(--primary-light); }
        .grid-box.filled { background: var(--primary); }
        .logo-main { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .logo-main span { color: var(--primary); }

        /* MENU */
        .side-menu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 2001; padding: 2rem; box-shadow: -10px 0 20px rgba(0,0,0,0.05); }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; }
        .overlay.active { display: block; }

        /* SEARCH & STRIPS */
        .container { max-width: 850px; margin: 0 auto; padding: 1rem; }
        .search-wrapper { display: flex; gap: 8px; background: white; padding: 8px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .search-wrapper input { flex: 1; border: none; padding: 12px; outline: none; font-size: 1rem; }
        .search-wrapper button { background: var(--primary); color: white; border: none; padding: 0 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 700; }
        
        .alphabet-strip { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; }
        .letter-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .letter-btn:hover { background: var(--primary); color: white; }

        /* CARDS */
        .word-card { background: white; padding: 1.8rem; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 1.5rem; }
        .ad-slot { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 16px; padding: 10px; text-align: center; margin: 20px 0; color: #94a3b8; font-size: 10px; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    
    <nav id="sideMenu" class="side-menu">
        <button onclick="toggleMenu()" style="float:right; border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
        <div style="margin-top:3rem;" id="sideCategoryList"></div>
    </nav>

    <header class="navbar">
        <div class="logo-wrapper" onclick="location.reload()">
            <div class="logo-icon">
                <div class="grid-box empty"></div><div class="grid-box filled"></div>
                <div class="grid-box filled"></div><div class="grid-box empty"></div>
            </div>
            <div class="logo-main">Kelime<span>Kelime</span></div>
        </div>
        <button onclick="toggleMenu()" style="background:var(--primary-light); color:var(--primary); border:none; padding:10px 15px; border-radius:12px; cursor:pointer; font-weight:800;">MENÜ ☰</button>
    </header>

    <main class="container">
        <section style="text-align:center; margin: 2rem 0;">
            <h1 style="font-size: 2.2rem; letter-spacing: -1px; font-weight: 800;">Bulmaca Sözlüğü</h1>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Kelime veya anlam ara...">
                <button id="searchBtn">Ara</button>
            </div>
        </section>

        <div class="ad-slot" id="top-ad">REKLAM GELECEK</div>

        <div id="alphabetStrip" class="alphabet-strip"></div>
        <div id="results"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // FONKSİYONLARI PENCEREYE BAĞLIYORUZ (Sıkı koruma)
        window.toggleMenu = function() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        const SB_URL = 'https://mvsbrknkfwwptjifdqca.supabase.co';
        const SB_KEY = 'sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        window.onload = () => {
            initAlphabet();
            initCategories();
            showVitrin();
            
            document.getElementById('searchBtn').onclick = () => runSearch(document.getElementById('searchInput').value);
        };

        function initAlphabet() {
            const letters = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");
            const strip = document.getElementById('alphabetStrip');
            letters.forEach(l => {
                const b = document.createElement('button');
                b.className = 'letter-btn';
                b.innerText = l;
                b.onclick = () => getByLetter(l);
                strip.appendChild(b);
            });
        }

        function initCategories() {
            const cats = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor", "Denizcilik"];
            const list = document.getElementById('sideCategoryList');
            cats.forEach(c => {
                const div = document.createElement('div');
                div.style = "padding:12px; cursor:pointer; font-weight:bold; border-bottom:1px solid #f1f5f9;";
                div.innerText = "• " + c;
                div.onclick = () => { toggleMenu(); filterByCategory(c); };
                list.appendChild(div);
            });
        }

        async function showVitrin() {
            const { data } = await _supabase.from('kelimeler').select('*').limit(5);
            render(data, "📅 Bugünün Öne Çıkanları");
        }

        async function runSearch(q) {
            const { data } = await _supabase.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(20);
            render(data, `🔍 "${q}" Sonuçları`);
        }

        async function getByLetter(l) {
            const { data } = await _supabase.from('kelimeler').select('*').ilike('kelime', `${l}%`).order('kelime');
            render(data, `${l} Harfi`);
        }

        async function filterByCategory(c) {
            const { data } = await _supabase.from('kelimeler').select('*').eq('kategori', c);
            render(data, c);
        }

        function render(data, title = "") {
            const res = document.getElementById('results');
            res.innerHTML = title ? `<h2 style="text-align:center; font-size:1.2rem;">${title}</h2>` : '';
            if(!data || data.length === 0) {
                res.innerHTML += "<p style='text-align:center; opacity:0.5;'>Bulunamadı.</p>";
                return;
            }
            data.forEach((item, index) => {
                const card = document.createElement('article');
                card.className = 'word-card';
                card.innerHTML = `
                    <small style="color:var(--primary); font-weight:800;">${item.kategori || 'Genel'}</small>
                    <p style="margin:10px 0; font-size:1.1rem; line-height:1.5;">${item.anlam}</p>
                    <h2 style="margin:0; font-size:1.7rem; font-weight:800;">${item.kelime}</h2>
                `;
                res.appendChild(card);
                
                // Reklam Yerleşimi (Her 3 kartta bir)
                if((index + 1) % 3 === 0) {
                    const ad = document.createElement('div');
                    ad.className = 'ad-slot';
                    ad.innerText = "AD UNIT";
                    res.appendChild(ad);
                }
            });
        }
    </script>
</body>
</html>
