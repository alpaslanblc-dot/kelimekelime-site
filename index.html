<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2174139710234620" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #4f46e5; --primary-light: #eef2ff; --bg: #fdfdfd; --text: #1e293b; --border: #f1f5f9; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 5%; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-icon { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; width: 34px; height: 34px; transform: rotate(-5deg); }
        .grid-box { border-radius: 4px; }
        .grid-box.empty { background: var(--primary-light); }
        .grid-box.filled { background: var(--primary); }
        .logo-main { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .logo-main span { color: var(--primary); }

        /* YAN MENÜ */
        .side-menu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 2001; padding: 1.5rem; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .side-menu.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .cat-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
        .cat-item { padding: 10px 14px; border-radius: 10px; background: #f8fafc; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: var(--text); font-size: 0.9rem; }
        .cat-item:hover { background: var(--primary-light); color: var(--primary); }

        .extra-links { border-top: 1px solid var(--border); padding-top: 15px; margin-top: 15px; }
        .extra-item { padding: 8px 14px; font-size: 0.85rem; color: #64748b; cursor: pointer; font-weight: 600; display: block; }
        .extra-item:hover { color: var(--primary); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 2rem; border-radius: 24px; max-width: 500px; width: 100%; position: relative; }

        /* KELİME ÖNER ALANI */
        .suggest-box { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 2rem; border-radius: 24px; text-align: center; margin: 3rem 0; }
        .suggest-btn { background: white; color: var(--primary); border: none; padding: 12px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px; }

        /* DİĞER STİLLER */
        .container { max-width: 850px; margin: 0 auto; padding: 1rem; }
        .search-wrapper { display: flex; gap: 8px; background: white; padding: 8px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        .search-wrapper input { flex: 1; border: none; padding: 12px; outline: none; font-size: 1rem; }
        .search-wrapper button { background: var(--primary); color: white; border: none; padding: 0 1.5rem; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .alphabet-strip { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 1rem 0; }
        .letter-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: white; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.8rem; }
        .word-card { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    
    <nav id="sideMenu" class="side-menu">
        <div style="display:flex; justify-content: space-between; margin-bottom: 1.5rem;">
            <span style="font-weight:800; color:var(--primary)">KELİMEKELİME</span>
            <button onclick="toggleMenu()" style="border:none; background:none; font-size:1.2rem; cursor:pointer;">✕</button>
        </div>
        <div id="sideCategoryList" class="cat-list"></div>
        
        <div class="extra-links">
            <span class="extra-item" onclick="openModal('about')">📖 Hakkımızda</span>
            <span class="extra-item" onclick="openModal('contact')">✉️ İletişim</span>
            <span class="extra-item" onclick="openModal('privacy')">🔒 Gizlilik Politikası</span>
        </div>
    </nav>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="margin-top:0"></h2>
            <div id="modalBody" style="line-height:1.6; color:#475569;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border:none; background:var(--primary); color:white; border-radius:12px; cursor:pointer; font-weight:700;">Kapat</button>
        </div>
    </div>

    <header class="navbar">
        <div class="logo-wrapper" onclick="location.reload()">
            <div class="logo-icon">
                <div class="grid-box empty"></div><div class="grid-box filled"></div>
                <div class="grid-box filled"></div><div class="grid-box empty"></div>
            </div>
            <div class="logo-main">Kelime<span>Kelime</span></div>
        </div>
        <button onclick="toggleMenu()" style="background:var(--primary-light); color:var(--primary); border:none; padding:10px 18px; border-radius:12px; cursor:pointer; font-weight:800;">MENÜ ☰</button>
    </header>

    <main class="container">
        <section style="text-align:center; padding: 1rem 0;">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Bulmacadaki soruyu veya cevabı yazın...">
                <button id="searchBtn">Ara</button>
            </div>
            <div id="alphabetStrip" class="alphabet-strip"></div>
        </section>

        <div id="results"></div>

        <section class="suggest-box">
