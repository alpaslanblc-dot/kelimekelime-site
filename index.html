<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KelimeKelime | Bulmaca Sözlüğü</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4f46e5; --pl: #eef2ff; --bg: #f8fafc; --t: #1e293b; --m: #64748b; --b: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--t); line-height: 1.6; }
        .nav { background: white; border-bottom: 1px solid var(--b); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--p); }
        .m-btn { background: var(--pl); color: var(--p); border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .strip { background: white; border-bottom: 1px solid var(--b); padding: 10px 0; overflow-x: auto; display: flex; gap: 8px; padding-left: 5%; padding-right: 5%; scrollbar-width: none; }
        .strip::-webkit-scrollbar { display: none; }
        .l-btn, .c-btn { flex-shrink: 0; border: 1px solid var(--b); background: white; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; padding: 8px 12px; }
        .l-btn:hover, .c-btn:hover, .active { background: var(--p); color: white; border-color: var(--p); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .s-wrap { margin: 20px 0; display: flex; gap: 8px; background: white; padding: 8px; border-radius: 16px; border: 1px solid var(--b); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .s-wrap input { flex: 1; border: none; padding: 12px; outline: none; font-size: 1rem; }
        .s-wrap button { background: var(--p); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--b); margin-bottom: 20px; }
        .card h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px; color: var(--t); margin-top: 5px; }
        .card small { background: var(--pl); color: var(--p); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .side { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 2000; padding: 30px 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.3s; }
        .side.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        .overlay.active { display: block; }
        .s-item { padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-weight: 600; }
        .s-item:hover { background: var(--pl); color: var(--p); }
    </style>
</head>
<body>

<div id="ovl" class="overlay" onclick="tM()"></div>
<nav id="sid" class="side">
    <div style="display:flex; justify-content: space-between; margin-bottom: 30px;">
        <b style="color:var(--p)">MENÜ</b>
        <button onclick="tM()" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>
    <div class="s-item" onclick="location.reload()">🏠 Ana Sayfa</div>
    <div class="s-item" onclick="alert('KelimeKelime: Bulmaca severler için ücretsiz sözlük.')">📖 Hakkımızda</div>
    <div class="s-item" onclick="alert('Bize ulaşın: destek@kelimekelime.com')">✉️ İletişim</div>
</nav>

<header class="nav">
    <div class="logo" onclick="location.reload()">Kelime<span>Kelime</span></div>
    <button class="m-btn" onclick="tM()">MENÜ ☰</button>
</header>

<div class="strip" id="alpha"></div>
<div class="strip" id="cats" style="border-top:none; padding-top:0;"></div>

<main class="container">
    <div class="s-wrap">
        <input type="text" id="sInp" placeholder="Soru veya cevap arayın...">
        <button onclick="search()">Ara</button>
    </div>
    <div id="res">
        <div style="text-align:center; padding:50px; color:var(--p); font-weight:600;">Veriler yükleniyor...</div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // URL'yi manuel olarak temizleyip kuruyoruz
    const pureUrl = "https://mvsbrknkfwwptjifdqca.supabase.co".replace(/\s/g, "");
    const pureKey = "sb_publishable_siHYnBPzrZSyHcx01nopsA_I4im8Ygr".replace(/\s/g, "");

    let sb;
    try {
        sb = supabase.createClient(pureUrl, pureKey);
        console.log("Bağlantı denendi...");
    } catch (e) {
        console.error("Kritik Hata:", e.message);
    }

    function tM() {
        document.getElementById('sid').classList.toggle('active');
        document.getElementById('ovl').classList.toggle('active');
    }

    window.onload = () => {
        const ltrs = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split("");
        ltrs.forEach(l => {
            const b = document.createElement('button');
            b.className = 'l-btn'; b.innerText = l;
            b.onclick = () => getByL(l);
            document.getElementById('alpha').appendChild(b);
        });

        const cs = ["Tarih", "Sanat", "İnanç", "Doğa", "Tıp", "Siyaset", "Spor", "Denizcilik"];
        cs.forEach(c => {
            const b = document.createElement('button');
            b.className = 'c-btn'; b.innerText = c;
            b.onclick = () => getByC(c);
            document.getElementById('cats').appendChild(b);
        });

        if(sb) loadV();
    };

    async function loadV() {
        try {
            const { data, error } = await sb.from('kelimeler').select('*').limit(10);
            if (error) throw error;
            render(data, "📅 Bugünün Kelimeleri");
        } catch (e) {
            document.getElementById('res').innerHTML = `<div style="text-align:center; padding:30px; color:red;">Bağlantı Hatası: ${e.message}</div>`;
        }
    }

    async function search() {
        const q = document.getElementById('sInp').value.trim();
        if(!q || !sb) return;
        const { data } = await sb.from('kelimeler').select('*').or(`kelime.ilike.%${q}%,anlam.ilike.%${q}%`).limit(30);
        render(data, `🔍 "${q}" Sonuçları`);
    }

    async function getByL(l) {
        if(!sb) return;
        const { data } = await sb.from('kelimeler').select('*').ilike('kelime', `${l}%`).order('kelime');
        render(data, `${l} Harfi`);
    }

    async function getByC(c) {
        if(!sb) return;
        const { data } = await sb.from('kelimeler').select('*').eq('kategori', c).order('kelime');
        render(data, `${c} Kategorisi`);
    }

    function render(data, title) {
        const r = document.getElementById('res');
        r.innerHTML = `<h2 style="text-align:center; margin-bottom:20px; font-size:1.1rem; color:var(--m); text-transform:uppercase;">${title}</h2>`;
        
        if (!data || data.length === 0) {
            r.innerHTML += `<div style="text-align:center; padding:40px; opacity:0.6;">Sonuç bulunamadı.</div>`;
            return;
        }

        data.forEach(i => {
            const a = document.createElement('div');
            a.className = 'card';
            a.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <small>TANIMLAMA</small>
                    <small style="background:var(--p); color:white;">${i.kategori || 'Genel'}</small>
                </div>
                <p style="margin:15px 0; font-size:1.1rem; font-weight:500;">${i.anlam}</p>
                <div style="border-top:1px solid var(--b); padding-top:10px;">
                    <small style="color:var(--p); background:none; padding:0;">CEVAP</small>
                    <h2>${i.kelime.toUpperCase()}</h2>
                </div>
            `;
            r.appendChild(a);
        });
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
